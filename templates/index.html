<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Flask Quickstart</title>
    <style>
        :root {
            font-family: Georgia, "Times New Roman", serif;
            color: #1f1f1f;
            background: #f6f1e8;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background:
                radial-gradient(circle at top, rgba(176, 137, 104, 0.22), transparent 35%),
                linear-gradient(180deg, #f8f4ec 0%, #efe6d6 100%);
        }

        main {
            max-width: 40rem;
            margin: 2rem;
            padding: 3rem;
            border-radius: 20px;
            background: rgba(255, 252, 246, 0.92);
            box-shadow: 0 20px 60px rgba(82, 56, 31, 0.12);
            text-align: center;
        }

        h1 {
            margin-top: 0;
            font-size: clamp(2.2rem, 5vw, 4rem);
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
        }

        code {
            padding: 0.15rem 0.4rem;
            border-radius: 0.4rem;
            background: #efe4d0;
        }
    </style>
</head>
<body>
    <main>
        <h1>Flask Quickstart</h1>
        <p>Your minimal Flask project is running.</p>
        <p>Edit <code>app.py</code> and <code>templates/index.html</code> to start building.</p>
    </main>
</body>
</html>
