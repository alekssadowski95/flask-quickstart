[phases.setup]
providers = ["python"]
nixPkgs = ["python311", "python311Packages.pip"]

[phases.install]
cmds = [
    "python --version",
    "python -m pip install --upgrade pip",
    "python -m pip install -r requirements.txt",
]

[start]
cmd = "python -m gunicorn --bind 0.0.0.0:${PORT:-5000} app:app"
